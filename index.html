<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let it Light | مسار سلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #8B4513; /* اللون البني الرسمي للمسار */
            --soft-gold: #ffd700; /* لون التوهج الذهبي */
            --bg-color: #fcf9f5; /* لون خلفية هادئ ومريح */
            --text-color: #222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية التصميم Fullscreen */
        .fullscreen-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr; /* تقسيم الشاشة نصفين */
        }

        /* النصف الأيمن (الهوية والاسم) */
        .identity-side {
            background-color: var(--brand-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 50px;
            position: relative;
        }

        .identity-side::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--soft-gold) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            color: var(--soft-gold);
            text-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.3rem;
            color: #d7b5a1;
            font-weight: 300;
        }

        /* النصف الأيسر (الرسائل والزرار) */
        .content-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            background: linear-gradient(135deg, #f0f4f8 0%, #e1e9f1 100%);
            position: relative;
        }

        .message-glass {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.3);
            width: 90%;
            max-width: 600px;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .message-glass:hover {
            transform: translateY(-5px);
        }

        .vibe-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.4;
            opacity: 1;
            transition: opacity 0.4s;
        }

        .vibe-text.fade-out {
            opacity: 0;
        }

        .btn-glow {
            margin-top: 50px;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--brand-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 40px rgba(139, 69, 19, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-glow::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 200%;
            background: rgba(255,255,255,0.2);
            top: -50%;
            left: -60%;
            transform: rotate(30deg);
            transition: left 0.5s ease;
        }

        .btn-glow:hover {
            opacity: 0.95;
            box-shadow: 0 20px 50px rgba(139, 69, 19, 0.3);
            transform: translateY(-2px);
        }

        .btn-glow:hover::after {
            left: 120%;
        }

        /* تصميم متجاوب للموبايل */
        @media (max-width: 768px) {
            .fullscreen-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .identity-side {
                padding: 30px;
                text-align: center;
                height: auto;
            }

            h1 {
                font-size: 3rem;
            }

            .content-side {
                padding: 30px;
            }

            .message-glass {
                padding: 40px 20px;
                width: 100%;
            }

            .vibe-text {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="fullscreen-container">
        <div class="identity-side">
            <div class="brand-logo">مسار سلام</div>
            <h1>LET IT<br>LIGHT</h1>
            <p class="tagline">شركاء في طريق التعافي</p>
        </div>

        <div class="content-side">
            <div class="message-glass">
                <div class="vibe-text" id="vibeBox">
                    ضحكتك دي بالدنيا.. متغيبهاش عننا!
                </div>
            </div>
            
            <button class="btn-glow" onclick="nextMessage()">هات رسالة تانية رايقة</button>
        </div>
    </div>

    <script>
        const msgs = [
            "ضحكتك دي بالدنيا.. متغيبهاش عننا!",
            "فكها كدا يا بطل.. مفيش حاجة مستاهلة والله!",
            "اليوم ده بتاعك أنت.",
            "ارمي ورا ظهرك، مسار سلام بيقولك الجاي أحلى.",
            "على الهادي يا زبادي.. كل مر هيمر.",
            "خد نفس عميق.. أنت قدها وقدود!",
        function nextMessage() {
            const v = document.getElementById('vibeBox');
            v.classList.add('fade-out'); // إضافة حركة اختفاء
            
            setTimeout(() => {
                let newMsg;
                do {
                    newMsg = msgs[Math.floor(Math.random() * msgs.length)];
                } while (newMsg === v.innerText);
                
                v.innerText = newMsg;
                v.classList.remove('fade-out'); // إزالة حركة الاختفاء وظهور النص الجديد
            }, 400); // وقت التأخير للحركة
        }
    </script>
</body>
</html>
