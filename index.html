<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let it light</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1 {
  margin:15px;
}

.container {
  width:90%;
  max-width:420px;
}

.card {
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  padding:20px;
  backdrop-filter:blur(15px);
  margin-bottom:15px;
}

#randomMsg {
  text-align:center;
  margin:10px 0;
}

button {
  border:none;
  border-radius:12px;
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
  background:#38bdf8;
}

.moods button {
  background:rgba(255,255,255,0.2);
}

.active {
  background:#38bdf8 !important;
  color:black;
}

.chat-box {
  height:250px;
  overflow-y:auto;
}

.message {
  margin:10px 0;
  display:flex;
}

.user { justify-content:flex-end; }
.bot { justify-content:flex-start; }

.bubble {
  padding:10px 15px;
  border-radius:15px;
  max-width:70%;
}

.user .bubble {
  background:#38bdf8;
  color:black;
}

.bot .bubble {
  background:rgba(255,255,255,0.2);
}

.input-area {
  display:flex;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

.typing {
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<h1>Let it light ✨</h1>

<div class="container">

  <!-- Random Message -->
  <div class="card">
    <p id="randomMsg"></p>
    <button onclick="newMsg()">✨ رسالة جديدة</button>
  </div>

  <!-- Mood -->
  <div class="card moods">
    <div>اختر حالتك:</div>
    <button onclick="setMood('حزين')" id="m1">😔</button>
    <button onclick="setMood('قلق')" id="m2">😰</button>
    <button onclick="setMood('متوتر')" id="m3">😡</button>
    <button onclick="setMood('سعيد')" id="m4">😊</button>
  </div>

  <!-- Chat -->
  <div class="card">
    <div class="chat-box" id="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="اكتب هنا..." />
      <button onclick="send()">➤</button>
    </div>
  </div>

</div>

<script>
const API_URL = "PUT_API_HERE";

let currentMood = "";

const messages = [
  "كل يوم بداية جديدة ✨",
  "أنت أقوى مما تظن 💪",
  "السلام الداخلي يبدأ منك 🌿",
  "خذ نفسًا عميقًا 💫",
  "الأشياء الجميلة قادمة 💖"
];

function newMsg() {
  document.getElementById("randomMsg").innerText =
    messages[Math.floor(Math.random() * messages.length)];
}
window.onload = newMsg;

// Mood
function setMood(mood) {
  currentMood = mood;

  document.querySelectorAll(".moods button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

// Chat UI
function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);

  chat.scrollTop = chat.scrollHeight;
}

// Send
async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const chat = document.getElementById("chat");

  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "مسار سلام يكتب...";
  chat.appendChild(typing);

  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      message: text,
      mood: currentMood
    })
  });

  const data = await res.json();

  chat.removeChild(typing);

  typeEffect(data.reply);
}

// Typing animation
function typeEffect(text) {
  let i = 0;
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "message bot";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  msg.appendChild(bubble);
  chat.appendChild(msg);

  function typing() {
    if (i < text.length) {
      bubble.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }

  typing();
}
</script>

</body>
</html>
