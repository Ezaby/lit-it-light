<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Let it light</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:#0f172a; color:white;">

  <h1>Let it light ✨</h1>

  <p id="message"></p>

  <button onclick="newMessage()">رسالة جديدة</button>

  <script>
    const messages = [
      "كل يوم بداية جديدة ✨",
      "أنت أقوى مما تظن 💪",
      "السلام الداخلي يبدأ منك 🌿",
      "خذ نفسًا عميقًا 💫",
      "الأشياء الجميلة قادمة 💖"
    ];

    function newMessage() {
      const random = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("message").innerText = random;
    }

    window.onload = newMessage;
  </script>

</body>
</html>
