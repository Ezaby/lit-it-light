<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let it Light | مسار سلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #fdfdfd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main-card {
            background: #fff;
            padding: 40px 20px;
            border: 4px solid #8B4513; /* لون الهوية */
            box-shadow: 10px 10px 0px #8B4513;
            text-align: center;
            max-width: 400px;
            width: 85%;
        }
        .header-tag {
            background: #8B4513;
            color: #fff;
            padding: 4px 12px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #8B4513;
            font-weight: 900;
        }
        .message-area {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 40px 0;
            color: #333;

        function generateMessage() {
            const msgElement = document.getElementById('msg');
            msgElement.style.opacity = 0;
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * messages.length);
                msgElement.innerText = messages[randomIndex];
                msgElement.style.opacity = 1;
            }, 400);
        }
    </script>
</body>
</html>
