<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Let it light</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  overflow:hidden;
  color:white;
}

/* glow background */
body::before {
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:rgba(56,189,248,0.15);
  filter:blur(120px);
  top:-100px;
  left:-100px;
}

.container {
  width:92%;
  max-width:420px;
  z-index:2;
}

/* HEADER */
.title {
  text-align:center;
  font-size:2rem;
  font-weight:600;
  margin-bottom:15px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:16px;
  margin-bottom:12px;
}

/* RANDOM MESSAGE */
#randomMsg {
  text-align:center;
  opacity:0.9;
  font-size:0.95rem;
}

.btn {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

.btn:hover {
  transform:scale(1.03);
}

/* MOODS */
.moods {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}

.mood {
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  font-size:0.8rem;
  transition:0.2s;
}

.mood.active {
  background:#38bdf8;
  color:black;
}

/* CHAT */
.chat {
  height:260px;
  overflow-y:auto;
  padding-right:5px;
}

.msg {
  display:flex;
  margin:8px 0;
}

.user { justify-content:flex-end; }
.bot { justify-content:flex-start; }

.bubble {
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  font-size:0.9rem;
  line-height:1.4;
}

.user .bubble {
  background:#38bdf8;
  color:black;
}

.bot .bubble {
  background:rgba(255,255,255,0.12);
}

/* INPUT */
.inputBox {
  display:flex;
  gap:6px;
  margin-top:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

input::placeholder {
  color:#aaa;
}

.send {
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  cursor:pointer;
}

/* scrollbar */
.chat::-webkit-scrollbar {
  width:4px;
}
.chat::-webkit-scrollbar-thumb {
  background:#38bdf8;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">Let it light ✨</div>

  <!-- RANDOM -->
  <div class="card">
    <div id="randomMsg"></div>
    <button class="btn" onclick="newMsg()">New Light</button>
  </div>

  <!-- MOOD -->
  <div class="card moods">
    <div class="mood" onclick="setMood(this,'sad')">😔 حزين</div>
    <div class="mood" onclick="setMood(this,'anxious')">😰 قلق</div>
    <div class="mood" onclick="setMood(this,'angry')">😡 متوتر</div>
    <div class="mood" onclick="setMood(this,'happy')">😊 سعيد</div>
  </div>

  <!-- CHAT -->
  <div class="card">

    <div class="chat" id="chat"></div>

    <div class="inputBox">
      <input id="input" placeholder="اكتب رسالتك..." />
      <button class="send" onclick="send()">➤</button>
    </div>

  </div>

</div>

<script>
const messages = [
  "كل يوم بداية جديدة ✨",
  "أنت أقوى مما تظن 💪",
  "السلام يبدأ من الداخل 🌿",
  "خد نفس وكمّل 💫",
  "الأشياء الجميلة جاية 💖"
];

let mood = "";

function newMsg(){
  document.getElementById("randomMsg").innerText =
    messages[Math.floor(Math.random()*messages.length)];
}

window.onload = newMsg;

function setMood(el, value){
  mood = value;
  document.querySelectorAll(".mood").forEach(m=>m.classList.remove("active"));
  el.classList.add("active");
}

function addMsg(text,type){
  const chat = document.getElementById("chat");

  const row = document.createElement("div");
  row.className = "msg " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  addMsg("مسار سلام يكتب...","bot");

  setTimeout(()=>{
    document.querySelector(".bot:last-child .bubble").remove();
  },500);
}
</script>

</body>
</html>
